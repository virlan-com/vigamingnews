name: Auto-Update Gaming News

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes
  workflow_dispatch: # Allows you to run it manually anytime

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Gives the bot permission to save the file

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper script
        run: python scraper.py

      - name: Commit and push updated JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add news.json
          # This line ensures it only commits if new news was actually found
          git diff-index --quiet HEAD || git commit -m "Auto-update gaming news data"
          git push
